<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.11.0/dist/axios.min.js"></script>
</head>
<body>

    <button id="btn">Click me to get data</button>
    <p id="output"></p>

    <script>

        document.getElementById('btn').addEventListener('click', async () => {
            try {
                let response = await axios.get('https://jsonplaceholder.typicode.com/posts/1');
                document.getElementById('output').textContent = `Title: ${response.data.title}
                                                                Body: ${response.data.body}`
            } catch (error) {
                console.error('Fetch Error: ', error.message) // Logging
                // document.getElementById('output').textContent = 'Error Fetching Data';    // Όχι 'καρφωτά' μηνύματα
                document.getElementById('output').textContent = t.fetchError;    // Όχι 'καρφωτά' μηνύματα
            }
        })

        const messages = {
            en: { fetchError: 'Something went wrong. Please try again.' },
            el: { fetchError: 'Κάτι πήγε στραβά. Δοκιμάστε ξανά.' },
            fr: { fetchError: 'Une erreur est survenue. Veuillez réessayer.' }
        };

        const lang = navigator.language.slice(0, 2); // 'en', 'el', 'fr' κ.λπ.
        const t = messages[lang] || messages['en']; // fallback στα αγγλικά

        // Ο navigator είναι ένα built-in object του browser που δίνει πληροφορίες για τον browser και τη συσκευή του χρήστη.

    </script>
    
</body>
</html>
